<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — Prajapati Store</title>
  <meta name="description" content="View your order history at Prajapati Store." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <style>
    #print-ticket-container {
      display: none;
    }
    @media print {
      body > *:not(#print-ticket-container) {
        display: none !important;
      }
      #print-ticket-container {
        display: block !important;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        background: #fff;
      }
      /* In-print styles for the ticket */
      .ticket { max-width: 600px; margin: 0 auto; border: 2px dashed #C1440E; padding: 30px; border-radius: 12px; }
      .header { text-align: center; border-bottom: 2px dashed #ebdcd0; padding-bottom: 20px; margin-bottom: 20px; }
      .logo { font-size: 1.8rem; font-weight: 700; color: #C1440E; margin-bottom: 5px; }
      .subtitle { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #7b6d61; }
      .details { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #f4f0eb; padding-bottom: 15px; }
      .items-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
      .items-table th { border-bottom: 2px solid #ebdcd0; padding: 10px 0; text-align: left; font-size: 0.9rem; color: #C1440E; }
      .items-table td { padding: 12px 0; border-bottom: 1px solid #f4f0eb; font-size: 0.9rem; }
      .total-row { text-align: right; font-size: 1.25rem; font-weight: 700; color: #C1440E; margin-top: 20px; border-top: 2px dashed #C1440E; padding-top: 15px; }
      .footer { text-align: center; font-size: 0.8rem; color: #7b6d61; margin-top: 40px; border-top: 1px solid #f4f0eb; padding-top: 20px; }
    }
  </style>
</head>
<body>

  <div id="print-ticket-container"></div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Navbar -->
  <nav class="auth-nav" role="navigation" aria-label="Main navigation">
    <a href="/" class="logo">
      Prajapati Store
      <span>Handcrafted with Love</span>
    </a>
    <div class="nav-right">
      <a href="/" class="nav-link">🏠 Shop</a>
      <a href="#" class="nav-link" id="logout-nav-btn">Logout</a>
    </div>
  </nav>

  <!-- Orders Page -->
  <main class="orders-page" id="orders-page">
    <h1>📦 My Orders</h1>
    <p class="orders-subtitle">Track all your pottery orders from Prajapati Store</p>

    <div id="orders-container">
      <div class="loading-orders">
        <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;color:var(--terracotta);display:block;margin-bottom:1rem;"></i>
        Loading your orders…
      </div>
    </div>
  </main>

  <script src="../js/api.js?v=2.0"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Guard: must be logged in
      if (!API.isLoggedIn()) {
        window.location.href = '/login?redirect=orders';
        return;
      }

      // Logout
      document.getElementById('logout-nav-btn')?.addEventListener('click', (e) => {
        e.preventDefault();
        API.auth.logout();
        window.location.href = '/';
      });

      const container = document.getElementById('orders-container');

      try {
        const res = await API.orders.list();
        const orders = res.orders || [];
        window.ordersData = orders; // Save globally for print helper

        if (orders.length === 0) {
          container.innerHTML = `
            <div class="empty-orders">
              <i class="fa-solid fa-box-open"></i>
              <h3>No orders yet</h3>
              <p>You haven't placed any orders. Start shopping!</p>
              <a href="/" style="display:inline-flex;align-items:center;gap:8px;margin-top:1.5rem;padding:13px 28px;background:linear-gradient(135deg,var(--terracotta),var(--terracotta-dark));color:white;border-radius:50px;font-weight:700;font-size:.88rem;letter-spacing:1px;text-transform:uppercase;">
                <i class="fa-solid fa-store"></i> Browse Products
              </a>
            </div>`;
          return;
        }

        container.innerHTML = orders.map(order => {
          const date = new Date(order.created_at).toLocaleDateString('en-IN', {
            day: '2-digit', month: 'long', year: 'numeric'
          });
          const statusClass = `status-${order.status}`;
          const statusIcon = {
            confirmed: '✅', pending: '⏳', shipped: '🚚', delivered: '📦', cancelled: '❌'
          }[order.status] || '📋';

          return `
            <article class="order-card" aria-label="Order #${order.id}">
              <div class="order-card-header">
                <div>
                  <div class="order-id">Order #${order.id} ${order.booking_code ? `<span style="font-size:0.75rem;color:var(--terracotta);background:rgba(193,68,14,0.08);padding:3px 10px;border-radius:30px;margin-left:8px;font-family:monospace;font-weight:700;">Code: ${order.booking_code}</span>` : ''}</div>
                  <div class="order-date">Placed on ${date} · ${order.payment_method.toUpperCase()}</div>
                </div>
                <span class="order-status ${statusClass}">${statusIcon} ${order.status}</span>
              </div>

              <div class="order-card-body">
                ${(order.items || []).map(item => `
                  <div class="order-item-row" style="flex-wrap:wrap;gap:8px;">
                    <div style="flex:1;min-width:180px;">
                      <span class="order-item-name">${item.product_name}</span>
                      ${item.ticket_code ? `<div style="font-size:0.72rem;color:var(--terracotta);margin-top:4px;font-family:monospace;font-weight:700;display:flex;align-items:center;gap:4px;"><i class="fa-solid fa-ticket"></i> Ticket: ${item.ticket_code}</div>` : ''}
                    </div>
                    <span class="order-item-qty">× ${item.quantity}</span>
                    <span class="order-item-price">₹${item.line_total.toLocaleString('en-IN')}</span>
                  </div>
                `).join('')}
                <div style="margin-top:.8rem;font-size:.82rem;color:var(--gray-600);">
                  <i class="fa-solid fa-location-dot" style="margin-right:6px;color:var(--terracotta);"></i>
                  ${order.shipping_address}
                </div>
              </div>

              <div class="order-card-footer" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
                <div>
                  <div class="order-total-label" style="margin-bottom:6px;">
                    ${order.shipping_fee === 0 ? '🚚 Free Shipping applied' : `Shipping: ₹${order.shipping_fee}`}
                  </div>
                  <button onclick="printOrderReceipt('${order.id}')" style="background:none;border:1.5px solid var(--terracotta);color:var(--terracotta);padding:6px 16px;border-radius:20px;font-size:0.75rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;">
                    <i class="fa-solid fa-print"></i> Print Ticket
                  </button>
                </div>
                <div style="text-align:right;">
                  <div class="order-total-label">Order Total</div>
                  <div class="order-total-amount">₹${order.total_amount.toLocaleString('en-IN')}</div>
                </div>
              </div>
            </article>`;
        }).join('');

      } catch (err) {
        container.innerHTML = `
          <div class="empty-orders">
            <i class="fa-solid fa-triangle-exclamation" style="color:var(--terracotta);"></i>
            <h3>Could not load orders</h3>
            <p>${err.message}</p>
          </div>`;
      }
    });

    window.printOrderReceipt = function(orderId) {
      const order = (window.ordersData || []).find(o => String(o.id) === String(orderId));
      if (!order) return;
      
      const date = new Date(order.created_at).toLocaleDateString('en-IN', {
        day: '2-digit', month: 'long', year: 'numeric'
      });
      
      const container = document.getElementById('print-ticket-container');
      if (!container) return;
      
      container.innerHTML = `
        <div class="ticket">
          <div class="header">
             <div class="logo">Prajapati Store</div>
             <div class="subtitle">Booking Ticket / Invoice</div>
          </div>
          <div class="details">
             <div>
               <strong>Order ID:</strong> #${order.id}<br>
               ${order.booking_code ? `<strong>Booking Code:</strong> ${order.booking_code}<br>` : ''}
               <strong>Date:</strong> ${date}
             </div>
             <div style="text-align:right;">
               <strong>Payment:</strong> ${order.payment_method.toUpperCase()}<br>
               <strong>Status:</strong> ${order.status.toUpperCase()}
             </div>
          </div>
          <div style="margin-bottom:20px; font-size:0.9rem; background:#fdfbf9; padding:15px; border-radius:8px; border:1px solid #ebdcd0;">
             <strong>Shipping Address:</strong><br>
             ${order.shipping_address}
          </div>
          <table class="items-table">
             <thead>
               <tr>
                 <th>Item Description</th>
                 <th style="text-align:center;width:60px;">Qty</th>
                 <th style="text-align:right;width:100px;">Total</th>
               </tr>
             </thead>
             <tbody>
               ${(order.items || []).map(item => `
                 <tr>
                   <td>
                     ${item.product_name}
                     ${item.ticket_code ? `<br><span style="font-size:0.75rem;color:#C1440E;font-family:monospace;font-weight:bold;">[Ticket: ${item.ticket_code}]</span>` : ''}
                   </td>
                   <td style="text-align:center;">${item.quantity}</td>
                   <td style="text-align:right;">₹${item.line_total.toLocaleString('en-IN')}</td>
                 </tr>
               `).join('')}
             </tbody>
          </table>
          <div style="text-align:right; font-size:0.9rem; color:#777; margin-bottom:10px;">
             Shipping Fee: ${order.shipping_fee === 0 ? 'FREE' : `₹${order.shipping_fee}`}
           </div>
          <div class="total-row">
             Total Amount: ₹${order.total_amount.toLocaleString('en-IN')}
          </div>
          <div class="footer">
             Thank you for shopping with us!<br>
             Handcrafted with Love · Prajapati Store
          </div>
        </div>
      `;
      
      window.print();
    };
  </script>
</body>
</html>

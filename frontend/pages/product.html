<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product — Prajapati Store</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <header>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main class="container product-page">
    <div class="product-detail-grid">
      <div id="gallery" class="product-gallery">
        <!-- Images go here -->
      </div>
      <div id="buybox" class="product-buybox">
        <!-- Buy box goes here -->
      </div>
    </div>

    <section id="product-specs" class="product-specs">
      <h3>Product Details</h3>
      <div id="specs-content"></div>
    </section>

    <section id="product-reviews" class="product-reviews">
      <h3>Customer Reviews</h3>
      <div id="reviews-list"></div>
    </section>
  </main>

  <script src="../js/product.js"></script>
</body>
</html>
